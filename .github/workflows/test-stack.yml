name: Test Grafana HA Stack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env from example
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME/testpassword123/g' .env
          cat .env

      - name: Start Docker Compose stack
        run: docker compose up -d --wait

      - name: Check running containers
        run: docker compose ps

      - name: Show Postgres logs
        run: docker compose logs --tail=30 postgres

      - name: Show Grafana 1 logs
        run: docker compose logs --tail=30 grafana1

      - name: Show Grafana 2 logs
        run: docker compose logs --tail=30 grafana2

      - name: Wait for services to stabilize
        run: sleep 15

      - name: Test Nginx
        run: |
          curl -v http://localhost
          curl -sf http://localhost > /dev/null && echo "Nginx is UP" || exit 1

      - name: Test Grafana login page
        run: |
          curl -sf http://localhost/login && echo "Grafana responds" || exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v